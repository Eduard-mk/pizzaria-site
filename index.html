<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzaria</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

header {
    background: #ea1d2c;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 15px;
}

.categoria {
    margin-top: 15px;
    font-weight: bold;
}

.item {
    background: white;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
}

button {
    background: #ea1d2c;
    color: white;
    border: none;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    cursor: pointer;
}

.carrinho {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 10px;
    border-top: 2px solid #ccc;
}

.btn {
    background: #25d366;
    width: 100%;
    padding: 12px;
    font-size: 16px;
}
</style>
</head>

<body>

<header>
    <h2>🍕 Pizzaria Donninha</h2>
</header>

<div class="container">

<input type="text" id="nome" placeholder="Seu nome">

<div class="categoria">Tradicionais</div>

<div class="item">
Calabresa - R$45
<button onclick="add('Calabresa',45)">Adicionar</button>
</div>

<div class="item">
Portuguesa - R$45
<button onclick="add('Portuguesa',45)">Adicionar</button>
</div>

<div class="categoria">Especiais</div>

<div class="item">
Mussarela, frango, orégano - R$65
<button onclick="add('Especial Frango',65)">Adicionar</button>
</div>

<div class="item">
Moda da Casa - R$65
<button onclick="add('Moda da Casa',65)">Adicionar</button>
</div>

<div class="categoria">Combos</div>

<div class="item">
Combo Dupla - R$99.90
<button onclick="add('Combo Dupla',99.9)">Adicionar</button>
</div>

<div class="item">
Combo Econômico - R$78.90
<button onclick="add('Combo Econômico',78.9)">Adicionar</button>
</div>

</div>

<div class="carrinho">
<div id="lista"></div>
<b>Total: R$ <span id="total">0</span></b><br><br>
<button class="btn" onclick="enviar()">Enviar no WhatsApp</button>
</div>

<script>
let carrinho = [];
let total = 0;

function add(nome, preco) {
    carrinho.push({nome, preco});
    total += preco;
    atualizar();
}

function atualizar() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrinho.forEach((item, i) => {
        lista.innerHTML += `
        <div>
            ${item.nome}
            <button onclick="remover(${i})">❌</button>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

function remover(i) {
    total -= carrinho[i].preco;
    carrinho.splice(i,1);
    atualizar();
}

function enviar() {
    let nome = document.getElementById("nome").value;

    if(nome === "") {
        alert("Digite seu nome!");
        return;
    }

    let msg = `Pedido - ${nome}%0A`;

    carrinho.forEach(item => {
        msg += `- ${item.nome}%0A`;
    });

    msg += `%0ATotal: R$ ${total}`;

    let numero = "556492922978"; // TROCA AQUI

    window.open(`https://wa.me/${numero}?text=${msg}`);
}
</script>

</body>
</html>
